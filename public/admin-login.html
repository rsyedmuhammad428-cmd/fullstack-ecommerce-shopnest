<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ShopNest</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--black);
    }
    .login-card {
      background: var(--dark-2);
      border: 1px solid var(--border-gold);
      padding: 40px;
      border-radius: var(--rmd);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card .logo {
      justify-content: center;
      margin-bottom: 30px;
    }
    .login-card h2 {
      font-family: var(--font-d);
      color: var(--white);
      margin-bottom: 24px;
    }
    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <img src="https://i.postimg.cc/C173MHjC/Modern-gold-shopping-cart-logo.png" alt="ShopNest Logo" style="height:48px; width:auto;">
        <span class="logo-tx">ShopNest<span>.</span></span>
      </div>
      <h2>Admin Login</h2>
      <div id="errorMsg" class="error-msg">Invalid email or password.</div>
      <form id="adminLoginForm">
        <div class="lux-form-group" style="text-align: left;">
          <label class="lux-label">Email Address</label>
          <input type="email" id="adminEmail" class="lux-input" required placeholder="admin@shopnest.com">
        </div>
        <div class="lux-form-group" style="text-align: left;">
          <label class="lux-label">Password</label>
          <input type="password" id="adminPassword" class="lux-input" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-gold btn-full">Login to Dashboard</button>
      </form>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        const res = await fetch(`${API_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.msg || 'Login failed');

        localStorage.setItem('shopnest_admin_token', data.token);
        localStorage.setItem('shopnest_admin_user', JSON.stringify(data.user));
        
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    });

    // Check if already logged in
    if (localStorage.getItem('shopnest_admin_token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
